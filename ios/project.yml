name: ZapLivre
options:
  bundleIdPrefix: app.zaplivre
  deploymentTarget:
    iOS: "15.0"
  developmentLanguage: en

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ZapLivre:
    type: application
    platform: iOS

    sources:
      - path: ZapLivre/ZapLivre
        excludes:
          - "**/.DS_Store"
      - path: ZapLivre/Generated
        excludes:
          - "**/.DS_Store"

    info:
      path: ZapLivre/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleDisplayName: ZapLivre
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "ZapLivre precisa acessar o microfone para chamadas de voz"
        NSCameraUsageDescription: "ZapLivre precisa acessar a câmera para videochamadas"
        NSPhotoLibraryUsageDescription: "ZapLivre precisa acessar fotos para compartilhar imagens"
        NSPhotoLibraryAddUsageDescription: "Permite salvar fotos e vídeos recebidos na sua galeria"
        NSContactsUsageDescription: "ZapLivre precisa acessar contatos para encontrar amigos"
        NSLocalNetworkUsageDescription: "ZapLivre usa a rede local para descobrir e conectar com contatos próximos (P2P)"
        NSBonjourServices:
          - _p2p._udp
        UIBackgroundModes:
          - voip
          - remote-notification
          - audio
        # Backend endpoints consumed by the app (ZapLivreCore/SignalingClient)
        MESSAGE_STORE_URL: "https://store.associahub.com.br"
        SIGNALING_SERVER_URL: "wss://signaling.associahub.com.br/ws"

    settings:
      base:
        PRODUCT_NAME: ZapLivre
        PRODUCT_BUNDLE_IDENTIFIER: app.zaplivre.ios
        INFOPLIST_FILE: ZapLivre/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "T8N7A2P3TQ"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        ENABLE_BITCODE: false

        # Bridging header for Rust FFI
        SWIFT_OBJC_BRIDGING_HEADER: $(PROJECT_DIR)/ZapLivre/ZapLivre-Bridging-Header.h

        # Library search paths for libzaplivre_core
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Libraries

        # Linker flags for Rust core library (will be overridden per SDK)
        OTHER_LDFLAGS:
          - $(inherited)
          - -L$(PROJECT_DIR)/Libraries
          - "-Wl,-search_paths_first"
          - "-Wl,-headerpad_max_install_names"

        # Swift import paths for Generated module
        SWIFT_INCLUDE_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/ZapLivre/Generated

        # Header search paths
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/ZapLivre/Generated

        # Import paths (needed for module import)
        SWIFT_OBJC_INTERFACE_HEADER_NAME: ""

      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: ZapLivre/ZapLivre.dev.entitlements
          OTHER_LDFLAGS[sdk=iphoneos*]:
            - $(inherited)
            - -L$(PROJECT_DIR)/Libraries
            - -lzaplivre_core_ios
            - "-Wl,-search_paths_first"
            - "-Wl,-headerpad_max_install_names"
          OTHER_LDFLAGS[sdk=iphonesimulator*]:
            - $(inherited)
            - -L$(PROJECT_DIR)/Libraries
            - -lzaplivre_core_sim
            - "-Wl,-search_paths_first"
            - "-Wl,-headerpad_max_install_names"
        Release:
          CODE_SIGN_ENTITLEMENTS: ZapLivre/ZapLivre.prod.entitlements
          OTHER_LDFLAGS[sdk=iphoneos*]:
            - $(inherited)
            - -L$(PROJECT_DIR)/Libraries
            - -lzaplivre_core_ios
            - "-Wl,-search_paths_first"
            - "-Wl,-headerpad_max_install_names"
          OTHER_LDFLAGS[sdk=iphonesimulator*]:
            - $(inherited)
            - -L$(PROJECT_DIR)/Libraries
            - -lzaplivre_core_sim
            - "-Wl,-search_paths_first"
            - "-Wl,-headerpad_max_install_names"

    dependencies:
      # System frameworks
      - framework: Foundation.framework
        embed: false
      - framework: SwiftUI.framework
        embed: false
      - framework: CallKit.framework
        embed: false
      - framework: AVFoundation.framework
        embed: false
      - framework: CoreImage.framework
        embed: false
      - framework: UserNotifications.framework
        embed: false
      - framework: PushKit.framework
        embed: false
      - framework: Security.framework
        embed: false
      - framework: SystemConfiguration.framework
        embed: false
      - framework: libresolv.tbd
        embed: false

    scheme:
      testTargets:
        - ZapLivreTests
      gatherCoverageData: false

    attributes:
      SystemCapabilities:
        com.apple.BackgroundModes:
          enabled: 1
        com.apple.Push:
          enabled: 1

  ZapLivreTests:
    type: bundle.unit-test
    platform: iOS

    sources:
      - path: ZapLivre/ZapLivreTests
        excludes:
          - "**/.DS_Store"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.zaplivre.ios.tests
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "T8N7A2P3TQ"

        # Tests reference types from the app module that come from the
        # zaplivreFFI clang module (UniFFI generated), so the test target
        # needs the same module/header search paths as the app.
        SWIFT_INCLUDE_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/ZapLivre/Generated
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/ZapLivre/Generated

    dependencies:
      - target: ZapLivre
