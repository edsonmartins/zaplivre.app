version: '3.8'

services:
  # PostgreSQL - Message Store Database
  postgres:
    image: postgres:16-alpine
    container_name: zaplivre-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zaplivre}
      POSTGRES_USER: ${POSTGRES_USER:-zaplivre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zaplivre_dev_password}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zaplivre}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zaplivre-network

  # Redis - Presence & Queue
  redis:
    image: redis:7-alpine
    container_name: zaplivre-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-zaplivre_redis_dev}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zaplivre-network

  # coturn - TURN/STUN Server
  coturn:
    image: coturn/coturn:latest
    container_name: zaplivre-coturn
    # Segredo e IP externo via env (o conf não interpola variáveis) - SEC-12/13
    command: >-
      -c /etc/coturn/turnserver.conf
      --static-auth-secret=${TURN_STATIC_SECRET:-zaplivre_turn_dev_secret}
      --external-ip=${TURN_EXTERNAL_IP:-127.0.0.1}
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "49152-65535:49152-65535/udp"
    volumes:
      - ./server/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./server/coturn/healthcheck.sh:/healthcheck.sh:ro
    healthcheck:
      test: ["/bin/sh", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zaplivre-network
    restart: unless-stopped

  # TURN Credentials Service
  turn-credentials:
    build:
      context: .
      dockerfile: server/turn-credentials/Dockerfile
    container_name: zaplivre-turn-credentials
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - TURN_STATIC_SECRET=${TURN_STATIC_SECRET:-zaplivre_turn_dev_secret}
      - SERVER_PORT=8082
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - zaplivre-network
    depends_on:
      coturn:
        condition: service_healthy
    restart: unless-stopped

  # Bootstrap Node 1 (Local Development)
  bootstrap-node-1:
    build:
      context: .
      dockerfile: server/bootstrap/Dockerfile
    container_name: zaplivre-bootstrap-1
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - BOOTSTRAP_PORT=4001
      - HEALTH_PORT=8000
      - PEER_ID_SEED=bootstrap-1
      - DATA_DIR=/app/data
      # Relay configuration (FASE 10)
      - RELAY_ENABLED=${RELAY_ENABLED:-true}
      - RELAY_MAX_CIRCUITS=${RELAY_MAX_CIRCUITS:-100}
      - RELAY_MAX_PER_PEER=${RELAY_MAX_PER_PEER:-10}
      - RELAY_MAX_BYTES_PER_SEC=${RELAY_MAX_BYTES_PER_SEC:-1000000}
    ports:
      - "4001:4001"    # P2P
      - "8000:8000"    # Health check
    volumes:
      - bootstrap_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zaplivre-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Message Store Server (FASE 11)
  message-store:
    build:
      context: .
      dockerfile: server/store/Dockerfile
    container_name: zaplivre-store
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-zaplivre}:${POSTGRES_PASSWORD:-zaplivre_dev_password}@postgres:5432/${POSTGRES_DB:-zaplivre}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-zaplivre_redis_dev}@redis:6379
      - SERVER_PORT=8080
      - ENABLE_TTL_CLEANUP=${ENABLE_TTL_CLEANUP:-true}
      # PSH-02: acordar destinatários offline via push
      - PUSH_SERVER_URL=http://push-server:8081
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zaplivre-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Push Notification Server
  push-server:
    build:
      context: .
      dockerfile: server/push/Dockerfile
    container_name: zaplivre-push
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      # FCM HTTP v1: JSON do service account em server/push/certs/
      - FCM_SERVICE_ACCOUNT_PATH=/etc/push/fcm_service_account.json
      # APNs token-based auth (.p8 key) - see docs/APNS_SETUP_GUIDE.md
      - APNS_KEY_PATH=/etc/push/apns_key.p8
      - APNS_KEY_ID=${APNS_KEY_ID:-}
      - APNS_TEAM_ID=${APNS_TEAM_ID:-}
      - APNS_BUNDLE_ID=${APNS_BUNDLE_ID:-app.zaplivre.ios}
      - APNS_PRODUCTION=${APNS_PRODUCTION:-false}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-zaplivre}:${POSTGRES_PASSWORD:-zaplivre_dev_password}@postgres:5432/${POSTGRES_DB:-zaplivre}
      - PORT=8081
    ports:
      - "8081:8081"
    volumes:
      - ./server/push/certs:/etc/push:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zaplivre-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Identity Server (usernames + prekey bundles - ADR 001)
  identity-server:
    build:
      context: .
      dockerfile: server/identity/Dockerfile
    container_name: zaplivre-identity
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-zaplivre}:${POSTGRES_PASSWORD:-zaplivre_dev_password}@postgres:5432/${POSTGRES_DB:-zaplivre}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-zaplivre_redis_dev}@redis:6379
      - BIND_ADDR=0.0.0.0:8083
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zaplivre-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Signaling Server (WebRTC fallback - WebSocket relay)
  signaling-server:
    build:
      context: .
      dockerfile: server/signaling/Dockerfile
    container_name: zaplivre-signaling
    environment:
      - RUST_LOG=${RUST_LOG:-info}
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - zaplivre-network
    restart: unless-stopped

  # Prometheus - Metrics (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: zaplivre-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./server/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - zaplivre-network
    profiles:
      - monitoring

  # Grafana - Dashboards (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: zaplivre-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./server/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./server/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - zaplivre-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  bootstrap_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  zaplivre-network:
    driver: bridge
