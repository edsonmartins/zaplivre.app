version: '3.8'

services:
  # PostgreSQL - Message Store Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB obrigatório}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER obrigatório}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zaplivre-network
      - traefik-network
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      placement:
        constraints:
          - node.role == manager

  # Redis - Presence & Queue
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD obrigatório}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --raw incr ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zaplivre-network
      - traefik-network
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  # coturn - TURN/STUN Server
  coturn:
    image: coturn/coturn:latest
    # Segredo e IP externo via env (o conf não interpola variáveis) - SEC-12/13
    command: >-
      -c /etc/coturn/turnserver.conf
      --static-auth-secret=${TURN_STATIC_SECRET:?TURN_STATIC_SECRET obrigatório em produção}
      --external-ip=${TURN_EXTERNAL_IP:?TURN_EXTERNAL_IP obrigatório em produção}
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "49152-65535:49152-65535/udp"
    volumes:
      - ./server/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./server/coturn/healthcheck.sh:/healthcheck.sh:ro
    healthcheck:
      test: ["/bin/sh", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zaplivre-network
      - traefik-network
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  # TURN Credentials Service
  turn-credentials:
    image: zaplivre-turn-credentials:latest
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - TURN_STATIC_SECRET=${TURN_STATIC_SECRET:?TURN_STATIC_SECRET obrigatorio}
      - TURN_CREDENTIAL_TTL_SECONDS=${TURN_CREDENTIAL_TTL_SECONDS:-3600}
      - TURN_MAX_CONCURRENT=${TURN_MAX_CONCURRENT:-64}
      - SERVER_PORT=8082
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - zaplivre-network
      - traefik-network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.zaplivre-turn-credentials.rule=Host(`turn.associahub.com.br`)"
        - "traefik.http.routers.zaplivre-turn-credentials.entrypoints=websecure"
        - "traefik.http.routers.zaplivre-turn-credentials.tls=true"
        - "traefik.http.routers.zaplivre-turn-credentials.tls.certresolver=letsencrypt"
        - "traefik.http.services.zaplivre-turn-credentials.loadbalancer.server.port=8082"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  # Bootstrap Node 1
  bootstrap-node-1:
    image: zaplivre-bootstrap:latest
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - BOOTSTRAP_PORT=4001
      - HEALTH_PORT=8000
      - PEER_ID_SEED=bootstrap-1
      - DATA_DIR=/app/data
      - RELAY_ENABLED=${RELAY_ENABLED:-true}
      - RELAY_MAX_CIRCUITS=${RELAY_MAX_CIRCUITS:-100}
      - RELAY_MAX_PER_PEER=${RELAY_MAX_PER_PEER:-10}
      - RELAY_MAX_BYTES_PER_SEC=${RELAY_MAX_BYTES_PER_SEC:-1000000}
    ports:
      - "4001:4001"
      - "8000:8000"
    volumes:
      - bootstrap_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zaplivre-network
      - traefik-network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.zaplivre-bootstrap-1.rule=Host(`dht1.associahub.com.br`)"
        - "traefik.http.routers.zaplivre-bootstrap-1.entrypoints=websecure"
        - "traefik.http.routers.zaplivre-bootstrap-1.tls=true"
        - "traefik.http.routers.zaplivre-bootstrap-1.tls.certresolver=letsencrypt"
        - "traefik.http.services.zaplivre-bootstrap-1.loadbalancer.server.port=8000"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  bootstrap-node-2:
    image: zaplivre-bootstrap:latest
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - BOOTSTRAP_PORT=4001
      - HEALTH_PORT=8000
      - PEER_ID_SEED=bootstrap-2
      - DATA_DIR=/app/data
      - RELAY_ENABLED=${RELAY_ENABLED:-true}
      - RELAY_MAX_CIRCUITS=${RELAY_MAX_CIRCUITS:-100}
      - RELAY_MAX_PER_PEER=${RELAY_MAX_PER_PEER:-10}
      - RELAY_MAX_BYTES_PER_SEC=${RELAY_MAX_BYTES_PER_SEC:-1000000}
    ports:
      - "4002:4001"
      - "8001:8000"
    volumes:
      - bootstrap_data_2:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zaplivre-network
      - traefik-network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.zaplivre-bootstrap-2.rule=Host(`dht2.associahub.com.br`)"
        - "traefik.http.routers.zaplivre-bootstrap-2.entrypoints=websecure"
        - "traefik.http.routers.zaplivre-bootstrap-2.tls=true"
        - "traefik.http.routers.zaplivre-bootstrap-2.tls.certresolver=letsencrypt"
        - "traefik.http.services.zaplivre-bootstrap-2.loadbalancer.server.port=8000"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  # Message Store Server
  message-store:
    image: zaplivre-store:latest
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER obrigatório}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB obrigatório}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD obrigatório}@redis:6379
      - SERVER_PORT=8080
      - ENABLE_TTL_CLEANUP=${ENABLE_TTL_CLEANUP:-true}
      # PSH-02: acordar destinatários offline via push
      - PUSH_SERVER_URL=http://push-server:8081
      - PUSH_SERVICE_SECRET=${PUSH_SERVICE_SECRET:?PUSH_SERVICE_SECRET obrigatorio}
      - PUSH_MAX_CONCURRENT=${PUSH_MAX_CONCURRENT:-128}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zaplivre-network
      - traefik-network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.zaplivre-store.rule=Host(`store.associahub.com.br`)"
        - "traefik.http.routers.zaplivre-store.entrypoints=websecure"
        - "traefik.http.routers.zaplivre-store.tls=true"
        - "traefik.http.routers.zaplivre-store.tls.certresolver=letsencrypt"
        - "traefik.http.services.zaplivre-store.loadbalancer.server.port=8080"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  # Push Notification Server
  push-server:
    image: zaplivre-push:latest
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      # FCM HTTP v1: JSON do service account em server/push/certs/
      - FCM_SERVICE_ACCOUNT_PATH=/etc/push/fcm_service_account.json
      # APNs token-based auth (.p8 key) - see docs/APNS_SETUP_GUIDE.md
      - APNS_KEY_PATH=/etc/push/apns_key.p8
      - APNS_KEY_ID=${APNS_KEY_ID:-}
      - APNS_TEAM_ID=${APNS_TEAM_ID:-}
      - APNS_BUNDLE_ID=${APNS_BUNDLE_ID:-app.zaplivre.ios}
      - APNS_PRODUCTION=${APNS_PRODUCTION:-true}
      - DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER obrigatório}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB obrigatório}
      - PORT=8081
      - PUSH_SERVICE_SECRET=${PUSH_SERVICE_SECRET:?PUSH_SERVICE_SECRET obrigatorio}
      - PUSH_MAX_CONCURRENT=${PUSH_MAX_CONCURRENT:-128}
    ports:
      - "8081:8081"
    volumes:
      - ./server/push/certs:/etc/push:ro
    networks:
      - zaplivre-network
      - traefik-network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.zaplivre-push.rule=Host(`push.associahub.com.br`)"
        - "traefik.http.routers.zaplivre-push.entrypoints=websecure"
        - "traefik.http.routers.zaplivre-push.tls=true"
        - "traefik.http.routers.zaplivre-push.tls.certresolver=letsencrypt"
        - "traefik.http.services.zaplivre-push.loadbalancer.server.port=8081"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  # Identity Server (usernames + prekey bundles - ADR 001)
  identity-server:
    image: zaplivre-identity:latest
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER obrigatório}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB obrigatório}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD obrigatório}@redis:6379
      - BIND_ADDR=0.0.0.0:8083
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zaplivre-network
      - traefik-network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.zaplivre-identity.rule=Host(`identity.associahub.com.br`)"
        - "traefik.http.routers.zaplivre-identity.entrypoints=websecure"
        - "traefik.http.routers.zaplivre-identity.tls=true"
        - "traefik.http.routers.zaplivre-identity.tls.certresolver=letsencrypt"
        - "traefik.http.services.zaplivre-identity.loadbalancer.server.port=8083"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  # Signaling Server (WebRTC fallback)
  signaling-server:
    image: ghcr.io/integrall-tech/zaplivre-signaling:latest
    environment:
      - RUST_LOG=${RUST_LOG:-info}
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - zaplivre-network
      - traefik-network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.zaplivre-signaling.rule=Host(`signaling.associahub.com.br`)"
        - "traefik.http.routers.zaplivre-signaling.entrypoints=websecure"
        - "traefik.http.routers.zaplivre-signaling.tls=true"
        - "traefik.http.routers.zaplivre-signaling.tls.certresolver=letsencrypt"
        - "traefik.http.services.zaplivre-signaling.loadbalancer.server.port=8086"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  # Prometheus - Metrics (Optional)
  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./server/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - zaplivre-network
      - traefik-network
    deploy:
      replicas: 0
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  # Grafana - Dashboards (Optional)
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./server/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./server/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - zaplivre-network
      - traefik-network
    deploy:
      replicas: 0
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  bootstrap_data:
    driver: local
  bootstrap_data_2:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  zaplivre-network:
    driver: overlay
  traefik-network:
    external: true
