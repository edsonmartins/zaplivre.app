name: iOS CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'ios/**'
      - 'core/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'ios/**'
      - 'core/**'
      - '.github/workflows/ios-ci.yml'

env:
  # Mesmos ajustes do ios/build-rust.sh
  CMAKE_POLICY_VERSION_MINIMUM: '3.5'
  IPHONEOS_DEPLOYMENT_TARGET: '13.0'
  CARGO_TARGET_AARCH64_APPLE_IOS_RUSTFLAGS: '-C link-arg=-miphoneos-version-min=13.0'

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        # Exigido pelo build.rs do spqr-syft (libsignal PQXDH). cmake já vem no runner macOS.
        run: brew install protobuf

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2

      - name: Install uniffi-bindgen
        run: cargo install uniffi --version '^0.31' --features cli

      - name: Build Rust core for iOS device
        run: |
          cd core
          cargo build --release --target aarch64-apple-ios --features voip -p zaplivre-core
          mkdir -p ../ios/Libraries
          cp ../target/aarch64-apple-ios/release/libzaplivre_core.a \
             ../ios/Libraries/libzaplivre_core_ios.a

      - name: Generate Swift bindings
        run: ./ios/generate-bindings.sh

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        # O projeto é gerado por XcodeGen a partir de ios/project.yml
        # (não há Podfile/xcworkspace neste repo)
        run: cd ios && xcodegen generate

      - name: Build iOS project
        run: |
          cd ios
          xcodebuild -project ZapLivre.xcodeproj \
            -scheme ZapLivre \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

  swiftlint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          cd ios
          swiftlint lint --strict
        continue-on-error: true
