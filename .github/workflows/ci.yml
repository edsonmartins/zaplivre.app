name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (core + servers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (protoc, cmake)
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake libssl-dev pkg-config libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check workspace (default features)
        run: cargo check --workspace

      - name: Check core with voip feature
        # A feature voip é opcional e já escondeu código quebrado (ENV-04);
        # verificar sempre no CI
        run: cargo check -p zaplivre-core --features voip

      - name: Unit tests (core lib)
        run: cargo test -p zaplivre-core --lib

      - name: Integration tests (working suites)
        run: cargo test -p zaplivre-core --test p2p_messaging --test relay_integration --test message_integration --test reliability

      - name: Server tests
        run: cargo test -p zaplivre-store -p zaplivre-push -p turn-credentials -p zaplivre-signaling

  identity-integration:
    name: Identity server integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zaplivre
          POSTGRES_DB: zaplivre_identity
          # Banco efêmero do runner (só localhost, destruído ao fim do job):
          # sem senha, autenticação por trust. Evita hardcodar credencial.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgres://zaplivre@localhost:5432/zaplivre_identity
      REDIS_URL: redis://localhost:6379
      IDENTITY_SERVER_URL: http://localhost:8083
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler postgresql-client

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Apply identity schema
        # db::init_pool não aplica schema - só cria o pool
        run: psql "$DATABASE_URL" -f server/identity/schema.sql

      - name: Build and start identity-server
        run: |
          cargo build -p zaplivre-identity-server
          BIND_ADDR=127.0.0.1:8083 RATE_LIMIT_DISABLED=1 ./target/debug/zaplivre-identity-server &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8083/health && break
            sleep 1
          done

      - name: Identity integration tests
        run: cargo test -p zaplivre-core --test identity_integration --features integration-tests -- --test-threads=1

  voip-integration:
    name: VoIP integration (non-blocking)
    runs-on: ubuntu-latest
    # Testes P2P com timing real - não-bloqueante até provar estabilidade no runner
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake libssl-dev pkg-config libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: VoIP integration tests (including ignored)
        timeout-minutes: 20
        run: cargo test -p zaplivre-core --test voip_integration --features voip -- --include-ignored --test-threads=1

  desktop:
    name: Desktop (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Screen tests (vitest + Testing Library + mock do Tauri)
        run: npm test
