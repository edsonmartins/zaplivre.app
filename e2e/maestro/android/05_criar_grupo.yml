# Criar grupo: grupo criado aparece na lista
# Regressão (iOS teve isso): lista mockada sempre vazia
appId: com.mepassa
---
- runFlow: common/_setup_identity.yml
- tapOn:
    id: "conversations_groups"
- tapOn:
    id: "grouplist_fab"
# Dialog "Criar Grupo" (confirmar = "Criar")
- tapOn:
    id: "grouplist_create_name_input"
- inputText: "Grupo Maestro"
- tapOn:
    id: "grouplist_create_confirm"
- extendedWaitUntil:
    visible: "Grupo Maestro"
    timeout: 10000
