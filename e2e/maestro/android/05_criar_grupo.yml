# Criar grupo: grupo criado aparece na lista
# Regressão (iOS teve isso): lista mockada sempre vazia
appId: com.mepassa
---
- launchApp
- extendedWaitUntil:
    visible: "Conversas"
    timeout: 10000
- tapOn: "Grupos"
- tapOn:
    id: ".*fab.*"
    optional: true
- tapOn: "Criar grupo"
- inputText: "Grupo Maestro"
- tapOn: "Criar"
- assertVisible: "Grupo Maestro"
