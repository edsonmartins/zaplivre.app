# Anti-órfã: toda tela principal precisa ser alcançável pela navegação
# Regressão: AND-13 (Settings/Profile/Search ficaram órfãs por meses)
appId: com.mepassa
---
- launchApp
- extendedWaitUntil:
    visible: "Conversas"
    timeout: 10000

# Busca global
- tapOn: "Buscar"
- back

# Grupos
- tapOn: "Grupos"
- back

# Configurações (backup de identidade mora aqui!)
- tapOn: "Configurações"
- assertVisible: "Exportar backup da identidade"
- assertVisible: "Sair"
- back
