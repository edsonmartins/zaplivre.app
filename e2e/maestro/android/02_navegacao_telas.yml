# Anti-órfã: toda tela principal precisa ser alcançável pela navegação
# Regressão: AND-13 (Settings/Profile/Search ficaram órfãs por meses)
appId: com.zaplivre
---
- runFlow: common/_setup_identity.yml

# Busca global
- tapOn:
    id: "conversations_search"
- assertVisible:
    id: "search_input"
- back

# Grupos
- tapOn:
    id: "conversations_groups"
- assertVisible: "Grupos"
- back

# Configurações (backup de identidade mora aqui!)
- tapOn:
    id: "conversations_settings"
- assertVisible: "Exportar backup da identidade"
- assertVisible: "Sair"
- back
