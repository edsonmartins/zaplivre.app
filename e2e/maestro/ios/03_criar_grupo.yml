# Criar grupo iOS: grupo criado precisa aparecer na lista
# Regressão IOS-10: loadGroups/createGroup eram mocks (lista sempre vazia)
appId: app.mepassa.ios
---
- runFlow: common/_setup_identity.yml
- tapOn:
    id: "conversations_groups"
- tapOn:
    id: "grouplist_fab"
- tapOn:
    id: "grouplist_create_name_input"
- inputText: "Grupo Maestro iOS"
- tapOn:
    id: "grouplist_create_confirm"
- extendedWaitUntil:
    visible: "Grupo Maestro iOS"
    timeout: 10000
